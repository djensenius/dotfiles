# NOTE: This file is git skip-worktree'd (theme switcher modifies it at runtime).
# To commit changes: git update-index --no-skip-worktree starship.toml
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "catppuccin_mocha"
command_timeout = 5000

# left prompt
format = """$battery$hostname$container$os$directory$character"""
# move the rest of the prompt to the right
right_format = """$all${custom.jj_branch}${custom.jj_op}${custom.jj_git_notinsync}"""

