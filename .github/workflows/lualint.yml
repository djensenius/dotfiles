---
name: Lint Lua files
on: pull_request  # yamllint disable-line rule:truthy
jobs:
  selene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run selene
        uses: NTBBloodbath/selene-action@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: nvim/
          version: 0.30.1
