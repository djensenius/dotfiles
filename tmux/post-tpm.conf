# Overrides applied after TPM loads, so they win over TPM's own keybindings.

# Run TPM operations in a popup instead of a split pane.
bind-key I display-popup -w 80% -h 80% -E "~/.config/tmux/plugins/tpm/scripts/install_plugins.sh && echo 'Done. Press ENTER to close.' && read"
bind-key U display-popup -w 80% -h 80% -E "~/.config/tmux/plugins/tpm/scripts/update_plugin.sh --shell-echo all && echo 'Done. Press ENTER to close.' && read"
bind-key M-u display-popup -w 80% -h 80% -E "~/.config/tmux/plugins/tpm/scripts/clean_plugins.sh && echo 'Done. Press ENTER to close.' && read"
